<svg width="300" height="300" viewBox="0 0 100 100" >
	<!-- The Curve -->
	<g id="layer0" >
		<rect id="cube" width="98" height="98" x="1" y="1" fill='none' label="boundary square"/>
	<g id="frame" label="layer_frame" >
		<line x1="99" y1="33" x2="1" y2="33" id="horz_line1"/>
		<line x1="99" y1="66" x2="1" y2="66" id="horz_line2"/>
		<line x1="33" y1="1" x2="33" y2="99" id="vert_line1"/>
