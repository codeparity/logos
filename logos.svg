		<circle cx="49" cy="16" r="3" id="circle_jump"/>
		<circle cx="49" cy="82" r="3" id="circle_down"/>
		<circle cx="16" cy="16" r="3" id="circle_back_jump"/>
		<circle cx="82" cy="16" r="3" id="circle_fwd_jump"/>
