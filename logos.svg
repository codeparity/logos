		<circle cx="82" cy="82" r="3" id="circle_fwd_down"/>
	</g>
	<g id="flow" >
		<!-- The flow - construction -->
		<!-- flow 1 : feeling to discover - good -> how -> why -->
		<path d="M 52 16 Q 66 10 79 16"/>
		<path d="M 19 82 Q 33 88 46 82"/>
		<path d="M 49 46 Q 43 33 49 19"/>
		<path d="M 49 52 Q 55 66 49 79"/>
		<!-- balance  -->
		<path d="M 52 16 Q 66 22 79 16"/>
		<path d="M 19 82 Q 33 76 46 82"/>
		<path d="M 49 46 Q 55 33 49 19"/>
		<path d="M 49 52 Q 42 66 49 79"/>

		<!-- The flow 2- destruction -->
		<!-- flow 1 : feeling to discover - byd -> how -> why -->
		<path d=" M 16 19 Q 10 33 16 46"/>
		<path d="M 19 49 Q 33 55 46 49"/>
		<path d="M 52 49 Q 66 43 79 49"/>
		<path d="M 82 52 Q 88 66 82 79"/>
		<!-- balance -->
		<path d="M 16 19 Q 22 33 16 46"/>
