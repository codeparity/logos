<style>
  /* Grey ramp — codeparity_pallette.gpl */
  :root {
    --g10: #191919;  /* ink        */
    --g30: #4b4b4b;  /* line       */
    --g60: #969696;  /* quiet      */
    --g90: #e1e1e1;  /* structure  */
    --g95: #f4f4f4;  /* paper      */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }
  body {
    background: var(--g95);
    color: var(--g10);
    font-family: Georgia, 'Times New Roman', serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .mono {
    font-family: ui-monospace, 'Cascadia Mono', 'JetBrains Mono', Menlo, monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--g60);
  }

  /* ---------- site header ---------- */

  @view-transition { navigation: auto; }
  @media (prefers-reduced-motion: reduce) {
    ::view-transition-group(*),
    ::view-transition-old(*),
    ::view-transition-new(*) { animation: none !important; }
  }

  .site {
    width: 100%;
    max-width: 110rem;
    margin: 0 auto;
    padding: clamp(1.2rem, 3vh, 2rem) clamp(1.5rem, 5vw, 5.5rem) 0;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 0.4rem 1.5rem;
    flex-wrap: wrap;
    view-transition-name: site-header;
  }
  .site .brand {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--g10);
    text-decoration: none;
  }
  .site-nav { display: flex; flex-wrap: wrap; gap: 0.4rem 1.4rem; }
  .site-nav a {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--g60);
    text-decoration: none;
    padding: 0.2rem 0;
    border-bottom: 1px solid transparent;
  }
  .site-nav a:hover { color: var(--g10); }
  .site-nav a[aria-current="page"] { color: var(--g10); border-bottom-color: var(--g10); }

  /* ---------- the one screen ---------- */

  .screen {
    flex: 1;
    min-height: 0;
    width: 100%;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: clamp(2rem, 5vw, 6rem);
    padding: clamp(1rem, 2.5vh, 2.5rem) clamp(1.5rem, 5vw, 5.5rem) clamp(1.5rem, 4vh, 3.5rem);
    max-width: 110rem;
    margin: 0 auto;
  }

  /* ---------- left · the symbol ---------- */

  .symbol-side {
    align-self: center;
    justify-self: center;
    width: 100%;
    max-width: min(42rem, 82vh);
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    grid-template-rows: auto minmax(0, 1fr);
    gap: 0.9rem;
  }
  .axis-top {
    grid-column: 2;
    display: grid; grid-template-columns: repeat(3, 1fr);
    text-align: center;
  }
  .axis-left {
    grid-row: 2;
    display: grid; grid-template-rows: repeat(3, 1fr);
    align-items: center;
  }
  .axis-left span { writing-mode: vertical-rl; transform: rotate(180deg); text-align: center; }

  .symbol-side svg { grid-column: 2; grid-row: 2; width: 100%; height: auto; display: block; }

  /* logo styling — geometry from logos.svg */
  .logo .frame  { stroke: var(--g90); stroke-width: 0.5; }
  .logo .cube   { fill: none; stroke: var(--g30); stroke-width: 0.7; }
  .logo .points { fill: var(--g95); stroke: var(--g10); stroke-width: 0.9; }
  .logo .flow    { fill: none; stroke-width: 0.6; stroke-linecap: round; }
  .logo .coagula { stroke: var(--g10); } /* binds — rises bottom-left → top-right */
  .logo .solve   { stroke: var(--g30); } /* takes apart — descends top-left → bottom-right */
  .logo .neutral { fill: var(--g10); }
  .logo .points circle.lit { fill: var(--g10); }

  .logo .cells rect { fill: transparent; cursor: pointer; outline: none; }
  .logo .cells rect:hover,
  .logo .cells rect:focus-visible,
  .logo .cells rect.on { fill: var(--g90); mix-blend-mode: multiply; }

  /* the symbol assembles from the Neutral Now outward:
     centre point → inner arms → mid points → outer arms → corner points.
     .rev flips the draw direction on paths authored toward the centre. */
  @media (prefers-reduced-motion: no-preference) {
    .logo .flow path {
      stroke-dasharray: 34;
      stroke-dashoffset: 34;
      animation: draw 1.1s ease-out forwards;
      animation-delay: 0.35s;
    }
    .logo .flow path.rev { stroke-dashoffset: -34; }
    .logo .flow path.outer { animation-delay: 1.4s; }

    .logo .points circle { opacity: 0; animation: appear 0.4s ease-out forwards; }
    .logo .points .neutral { animation-delay: 0.05s; }
    .logo .points .mid    { animation-delay: 1.25s; }
    .logo .points .corner { animation-delay: 2.3s; }

    @keyframes draw   { to { stroke-dashoffset: 0; } }
    @keyframes appear { to { opacity: 1; } }
  }

  /* ---------- right · the panel ---------- */

  .panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
    max-width: 36rem;
  }

  .pnav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 1.4rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--g90);
  }
  .pnav button {
    font: inherit;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
    background: none; border: none; cursor: pointer;
    color: var(--g60);
    padding: 0.2rem 0;
    border-bottom: 1px solid transparent;
  }
  .pnav button:hover { color: var(--g10); }
  .pnav button.active { color: var(--g10); border-bottom-color: var(--g10); }

  .pbody {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    scrollbar-width: none;
    padding: 2rem 0;
    opacity: 1;
    transition: opacity 0.16s ease-out;
    display: flex; flex-direction: column; justify-content: center;
  }
  .pbody::-webkit-scrollbar { display: none; }
  .pbody.fade { opacity: 0; }
  .pbody > .inner { margin: auto 0; }

  .pbody h1 {
    font-weight: normal;
    font-size: 1.05rem;
    font-family: ui-monospace, Menlo, monospace;
    letter-spacing: 0.42em; text-transform: uppercase;
  }
  .pbody h2 { font-weight: normal; font-size: 1.35rem; margin: 0.5rem 0 1.2rem; }
  .pbody .sub { color: var(--g60); font-style: italic; margin-top: 0.6rem; }
  .pbody p + p { margin-top: 1em; }
  .pbody em { color: var(--g30); }

  .thesis { margin: 1.8rem 0; font-size: 1.45rem; font-style: italic; line-height: 1.4; }

  .kicker { display: block; margin-bottom: 0.4rem; }
  .ask { margin-top: 1.8rem; }
  .prompt { font-size: 1.25rem; font-style: italic; line-height: 1.45; margin-top: 0.5rem; }

  .booklink { color: inherit; }
  .booklink:hover { color: var(--g30); }

  .chapter { margin-top: 1.8rem; color: var(--g60); font-size: 0.9rem; font-style: italic; }
  .chapter a { color: var(--g30); }

  dl.list dt {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 0.78rem; letter-spacing: 0.14em; text-transform: uppercase;
    margin-top: 1.3rem;
  }
  dl.list dd { color: var(--g30); margin-top: 0.15rem; }
  dl.gloss dt { font-family: inherit; font-style: italic; font-size: 1rem;
    letter-spacing: 0; text-transform: none; margin-top: 1.1rem; }

  ol.parts { list-style: none; }
  ol.parts li { padding: 0.55rem 0; border-bottom: 1px solid var(--g90); display: flex; gap: 1.2rem; align-items: baseline; }
  ol.parts .n { font-family: ui-monospace, Menlo, monospace; font-size: 0.72rem; color: var(--g60); }
  ol.parts .chapters { display: block; color: var(--g60); font-size: 0.85rem; font-style: italic; }

  /* ---------- panel foot ---------- */

  .pfoot {
    padding-top: 1.4rem;
    border-top: 1px solid var(--g90);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .design-btn {
    color: var(--g10);
    font-family: ui-monospace, Menlo, monospace;
    font-size: 0.78rem; letter-spacing: 0.14em; text-transform: uppercase;
    text-decoration: none;
    border: 1px solid var(--g10);
    padding: 0.8rem 1.4rem;
    transition: background 0.25s, color 0.25s;
  }
  .design-btn:hover { background: var(--g10); color: var(--g95); }
  .pfoot .book {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--g60); text-decoration: none;
  }
  .pfoot .book:hover { color: var(--g10); }

  /* ---------- small screens: allow scroll ---------- */

  @media (max-width: 880px) {
    body { overflow: auto; }
    .screen {
      height: auto;
      grid-template-columns: 1fr;
      gap: 2.5rem;
    }
    .symbol-side { max-width: 30rem; }
    .pbody { overflow: visible; }
  }
</style>

<div class="screen">

<script>
'use strict';

const BOOK = '<em>codeparity.com</em>';

/* ---------------- panel views ---------------- */

const VIEWS = {
  home: `
    <h1>Codeparity</h1>
    <p class="sub">An ancient symbol, re-read</p>
    <p class="thesis">Discover the nine choices<br>you&rsquo;re making right now.</p>
    <p>You have seen this wheel before. It is older than its worst
       century, and it was never a picture &mdash; it is a diagram.
       Time runs left to right &mdash; <em>past, now, future</em>.
       The self runs top to bottom &mdash; <em>why, how, feels</em>.
       Nine boxes, always running. Two currents cross at the centre:
       <em>solve</em> descends from the top-left and takes apart;
       <em>coagula</em> rises from the bottom-left and binds.</p>
    <p><span class="mono">click any box &mdash;</span></p>
    <p class="chapter">The full reading is still being written &mdash; ${BOOK}.</p>`,

  premise: `
    <span class="mono kicker">the premise</span>
    <h2>Parity, not happiness</h2>
    <p>A religion is just a system that tells you what to do with your
       time, and why. This one says so upfront.</p>
    <p>The goal is not happiness &mdash; dopamine, a moving target. The
       goal is <em>parity</em>: balance with your environment. You are
       born in debt to <em>habitus</em>, the code you did not write. The
       practice is debugging that inheritance, one live choice at a time.</p>
    <p><em>&ldquo;I didn&rsquo;t set out to found a religion. I set out to fix a bug
       in my own head. The fix turned out to be general-purpose enough to
       run on anyone.&rdquo;</em></p>
    <p class="chapter">The whole diagnosis lives in the book &mdash; coming soon at ${BOOK}.</p>`,

  symbols: `
    <span class="mono kicker">how to read it</span>
    <h2>Six symbols. Everything else is commentary.</h2>
    <dl class="list">
      <dt>The Grid</dt>
      <dd>Three layers of self &times; three moments of time. Nine live choices, always running.</dd>
      <dt>The Torus</dt>
      <dd>The grid, breathing. The Neutral Now sits at its still centre.</dd>
      <dt>0 and 1</dt>
      <dd>Not a fraction &mdash; a relationship. 0 the undivided source, 1 the first &ldquo;me.&rdquo;</dd>
      <dt>Saturn &middot; Earth &middot; Sun &middot; God</dt>
      <dd>Four stacked fathers. The last one settles the ledger.</dd>
      <dt>The Dog</dt>
      <dd>A literal street dog. Layer 0, run honestly.</dd>
      <dt>Death, the last debug</dt>
      <dd>The last commit. Whatever was running when the terminal closed is what got saved.</dd>
    </dl>`,

  book: `
    <span class="mono kicker">the book</span>
    <h2>Sixteen chapters, five parts</h2>
    <ol class="parts">
      <li><span class="n">01</span><span>Symbols
        <span class="chapters">how to read this book</span></span></li>
      <li><span class="n">02</span><span>The Diagnosis
        <span class="chapters">happiness is the wrong question &middot; habitus &middot; the duality trap</span></span></li>
      <li><span class="n">03</span><span>The Method
        <span class="chapters">the grid &middot; zero and one &middot; karma and karm &middot; the layering of god &middot; the torus &middot; the dog</span></span></li>
      <li><span class="n">04</span><span>The Practice
        <span class="chapters">becoming 0 &middot; the emotion wheel &middot; reclaiming the neutral now &middot; nodes and signal &middot; timing and collapse</span></span></li>
      <li><span class="n">05</span><span>Death and Closing
        <span class="chapters">death, the last debug &middot; nine choices, four fathers, one ledger</span></span></li>
    </ol>
    <p class="chapter">In the works &mdash; coming soon at ${BOOK}.</p>`,

  vocab: `
    <span class="mono kicker">vocabulary</span>
    <h2>Kept as-is, edges on</h2>
    <dl class="list gloss">
      <dt>habitus</dt>
      <dd>The pre-set inputs you&rsquo;re born into; the code you didn&rsquo;t write.</dd>
      <dt>karm / karma / dharma</dt>
      <dd>An action; its abstract result; purpose chosen on purpose.</dd>
      <dt>neutral now</dt>
      <dd>The one live box; where soul is lost to ego or reclaimed by attention.</dd>
      <dt>solve &middot; coagula</dt>
      <dd>The wheel&rsquo;s two currents, crossing at the centre.
          <em>Solve</em> descends from the top-left and takes apart;
          <em>coagula</em> rises from the bottom-left and binds.</dd>
      <dt>baldies</dt>
      <dd>Running the Middle-Class Algorithm flawlessly, without noticing it&rsquo;s an algorithm.</dd>
      <dt>sigma</dt>
      <dd>The archetype who breaks the loop.</dd>
      <dt>matrix 6 / 6G</dt>
      <dd>Engineered for the <em>feeling</em> of choice rather than its removal.</dd>
    </dl>`,
};

/* ---------------- the nine boxes ---------------- */

const CELLS = {
  'why-past': {
    name: 'why · past', title: 'the reason you inherited',
    body: `Habitus. The why that was installed before you could ask
           questions &mdash; family, class, the algorithm around you. It
           feels like conviction because it compiled long ago.`,
    ask: 'Whose reason are you running right now — yours, or one you were handed?',
    ch: 'Habitus' },
  'why-now': {
    name: 'why · now', title: 'purpose chosen on purpose',
    body: `Dharma. Not a mission statement &mdash; a why you could say out
           loud today without flinching. The only why that counts is one
           chosen while the box is live.`,
    ask: 'Say why you’re doing this, out loud. Does the sentence survive?',
    ch: 'Karma and Karm' },
  'why-future': {
    name: 'why · future', title: 'the reason you rehearse',
    body: `The imagined justification. A why that lives in tomorrow is a
           debt note: it spends today defending a self that does not
           exist yet.`,
    ask: 'How much of today went to defending a tomorrow that never asked?',
    ch: 'Happiness Is the Wrong Question' },
  'how-past': {
    name: 'how · past', title: 'the way it was done to you',
    body: `Method is inherited harder than opinion. You cook, argue,
           apologise and avoid the way it was done around you &mdash; code
           you didn&rsquo;t write, still running.`,
    ask: 'Which of your habits is actually someone else’s?',
    ch: 'Habitus' },
  'how-now': {
    name: 'how · now', title: 'the Neutral Now — the one live box',
    body: `The fulcrum. Eight boxes are stories; this is the only one
           where anything can actually be done. Here soul is lost to ego,
           or reclaimed by attention.`,
    ask: 'You are reading this from the one live box. What else is running in it?',
    ch: 'Reclaiming the Neutral Now' },
  'how-future': {
    name: 'how · future', title: 'the plan standing in for the act',
    body: `Planning feels like motion because it borrows the reward
           before the work. A plan is a promissory note the Now has to
           pay.`,
    ask: 'What is the smallest piece you could do before this feeling fades?',
    ch: 'Timing and Collapse' },
  'feels-past': {
    name: 'feels · past', title: 'feeling replayed',
    body: `Nostalgia and regret are the same tape at different speeds. A
           replayed feeling arrives pre-narrated &mdash; the story is
           already attached.`,
    ask: 'Is this feeling arriving, or being replayed?',
    ch: 'The Emotion Wheel' },
  'feels-now': {
    name: 'feels · now', title: 'feeling without a story on top',
    body: `Layer 0, run honestly &mdash; what the dog does. A feeling met
           in the now needs no defence, no narrator, no verdict. Ten
           seconds of it is practice.`,
    ask: 'Can you hold it for ten seconds without narrating it?',
    ch: 'The Dog' },
  'feels-future': {
    name: 'feels · future', title: 'feeling borrowed from tomorrow',
    body: `Anxiety is interest paid on a loan you may never take out. The
           body pays now for a scene that exists only as rehearsal.`,
    ask: 'How does your body feel right now, minus tomorrow?',
    ch: 'Becoming 0' },
};

function cellHTML(c) {
  return `
    <span class="mono kicker">${c.name}</span>
    <h2>${c.title}</h2>
    <p>${c.body}</p>
    <p class="mono ask">ask yourself</p>
    <p class="prompt">${c.ask}</p>
    <p class="chapter">Unpacked in <em>${c.ch}</em> &mdash; a chapter of the book, coming soon.</p>`;
}

/* ---------------- wiring ---------------- */

const pbody = document.getElementById('pbody');
const navBtns = document.querySelectorAll('.pnav button');
const cellRects = document.querySelectorAll('.cells rect');
const circles = document.querySelectorAll('.logo .points circle');
const CIRCLE_OF = ['why-past','why-now','why-future','how-past','how-now',
                   'how-future','feels-past','feels-now','feels-future'];
let activeCell = null;

function setPanel(html) {
  pbody.classList.add('fade');
  setTimeout(() => {
    pbody.innerHTML = '<div class="inner">' + html + '</div>';
    pbody.scrollTop = 0;
    pbody.classList.remove('fade');
  }, 160);
}

function clearCell() {
  activeCell = null;
  cellRects.forEach(r => r.classList.remove('on'));
  circles.forEach(c => c.classList.remove('lit'));
}

function setNav(view) {
  navBtns.forEach(b => b.classList.toggle('active', b.dataset.view === view));
}

function showView(view) {
  clearCell();
  setNav(view);
  setPanel(VIEWS[view]);
}

function showCell(key) {
  if (activeCell === key) { showView('home'); return; }
  clearCell();
  setNav(null);
  activeCell = key;
  document.querySelector(`.cells rect[data-cell="${key}"]`).classList.add('on');
  circles[CIRCLE_OF.indexOf(key)].classList.add('lit');
  setPanel(cellHTML(CELLS[key]));
}

navBtns.forEach(b => b.addEventListener('click', () => showView(b.dataset.view)));

cellRects.forEach(r => {
  r.setAttribute('tabindex', '0');
  r.setAttribute('role', 'button');
  r.setAttribute('aria-label', CELLS[r.dataset.cell].name + ' — ' + CELLS[r.dataset.cell].title);
  r.addEventListener('click', () => showCell(r.dataset.cell));
  r.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); showCell(r.dataset.cell); }
  });
});

// deep links: #book, #premise, #why-past, #feels-now, …
const hash = location.hash.slice(1);
if (CELLS[hash]) {
  activeCell = hash;
  setNav(null);
  document.querySelector(`.cells rect[data-cell="${hash}"]`).classList.add('on');
  circles[CIRCLE_OF.indexOf(hash)].classList.add('lit');
  pbody.innerHTML = '<div class="inner">' + cellHTML(CELLS[hash]) + '</div>';
} else {
  const view = VIEWS[hash] ? hash : 'home';
  setNav(view);
  pbody.innerHTML = '<div class="inner">' + VIEWS[view] + '</div>';
}
</script>
<script>
'use strict';
/* animated favicon — replays the symbol's draw in the tab icon once per
   visit, then settles on the finished mark. Firefox animates favicon.svg
   natively; this covers browsers that only take static favicons. */
(function () {
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = 64;
  const ctx = cnv.getContext('2d');
  if (!ctx) return;

  const L = 34, ARM_DUR = 1100, PT_DUR = 400, END = 2800;
  // [path, delay, rev] — rev draws toward the centre's far end, as on the page
  const SOLVE = [
    ['M 16 19 Q 10 33 16 46', 1400, 1], ['M 16 19 Q 22 33 16 46', 1400, 1],
    ['M 19 49 Q 33 55 46 49', 350, 1],  ['M 19 49 Q 33 42 46 49', 350, 1],
    ['M 52 49 Q 66 43 79 49', 350, 0],  ['M 52 49 Q 66 55 79 49', 350, 0],
    ['M 82 52 Q 88 66 82 79', 1400, 0], ['M 82 52 Q 76 66 82 79', 1400, 0],
  ];
  const COAGULA = [
    ['M 19 82 Q 33 88 46 82', 1400, 1], ['M 19 82 Q 33 76 46 82', 1400, 1],
    ['M 49 52 Q 55 66 49 79', 350, 0],  ['M 49 52 Q 42 66 49 79', 350, 0],
    ['M 49 46 Q 43 33 49 19', 350, 0],  ['M 49 46 Q 55 33 49 19', 350, 0],
    ['M 52 16 Q 66 10 79 16', 1400, 0], ['M 52 16 Q 66 22 79 16', 1400, 0],
  ];
  const ARMS = SOLVE.map(([d, t0, rev]) => ({ p: new Path2D(d), t0, rev, c: '#4b4b4b' }))
    .concat(COAGULA.map(([d, t0, rev]) => ({ p: new Path2D(d), t0, rev, c: '#191919' })));
  // [x, y, delay]
  const PTS = [
    [49, 49, 50],
    [49, 16, 1250], [16, 49, 1250], [82, 49, 1250], [49, 82, 1250],
    [16, 16, 2300], [82, 16, 2300], [16, 82, 2300], [82, 82, 2300],
  ];

  const link = document.createElement('link');
  link.rel = 'icon';
  document.head.appendChild(link);

  const ease = p => 1 - Math.pow(1 - p, 3);
  const clamp = v => Math.max(0, Math.min(1, v));

  function paint(t) {
    ctx.setTransform(0.64, 0, 0, 0.64, 0, 0);
    ctx.fillStyle = '#f4f4f4';
    ctx.fillRect(0, 0, 100, 100);
    ctx.strokeStyle = '#e1e1e1'; ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(1, 33); ctx.lineTo(99, 33); ctx.moveTo(1, 66); ctx.lineTo(99, 66);
    ctx.moveTo(33, 1); ctx.lineTo(33, 99); ctx.moveTo(66, 1); ctx.lineTo(66, 99);
    ctx.stroke();
    ctx.strokeStyle = '#4b4b4b'; ctx.lineWidth = 2;
    ctx.strokeRect(2.5, 2.5, 95, 95);

    ctx.lineCap = 'round'; ctx.lineWidth = 2.4;
    for (const a of ARMS) {
      const e = ease(clamp((t - a.t0) / ARM_DUR));
      if (e <= 0) continue;
      ctx.strokeStyle = a.c;
      if (a.rev) { ctx.setLineDash([L, L]); ctx.lineDashOffset = L + e * L; }
      else { ctx.setLineDash([e * L, 2 * L]); ctx.lineDashOffset = 0; }
      ctx.stroke(a.p);
    }
    ctx.setLineDash([]);

    for (const [x, y, t0] of PTS) {
      const a = ease(clamp((t - t0) / PT_DUR));
      if (a <= 0) continue;
      ctx.globalAlpha = a;
      const neutral = x === 49 && y === 49;
      ctx.beginPath();
      ctx.arc(x, y, 4.5, 0, 2 * Math.PI);
      ctx.fillStyle = neutral ? '#191919' : '#f4f4f4';
      ctx.fill();
      ctx.strokeStyle = '#191919';
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
    link.href = cnv.toDataURL('image/png');
  }

  const start = performance.now();
  (function tick() {
    const t = performance.now() - start;
    paint(Math.min(t, END));
    if (t < END) setTimeout(tick, 100);
  })();
})();
</script>
